<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyndGuard · Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Crimson+Pro:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy:#040d24;--deep:#080f2e;--blue:#0d1f5c;--accent:#d4a832;
      --gold:#f0c040;--pale:#c8d8f8;--muted:#7a90c0;--white:#f4f0e8;
      --green:#6ee7b7;--red:#f87171;
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--navy);color:var(--white);font-family:'Crimson Pro',Georgia,serif;font-size:17px;min-height:100vh;}

    /* Login */
    #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,rgba(13,31,92,0.8) 0%,var(--navy) 70%);}
    .login-box{background:rgba(13,31,92,0.5);border:1px solid rgba(212,168,50,0.2);border-radius:20px;padding:56px 48px;width:100%;max-width:420px;text-align:center;}
    .login-logo{font-family:'Playfair Display',serif;font-size:28px;color:var(--accent);margin-bottom:8px;}
    .login-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;margin-bottom:40px;}
    .login-input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(212,168,50,0.2);border-radius:10px;padding:14px 18px;color:var(--white);font-family:'Space Mono',monospace;font-size:14px;letter-spacing:4px;text-align:center;margin-bottom:16px;outline:none;transition:border-color 0.2s;}
    .login-input:focus{border-color:rgba(212,168,50,0.6);}
    .login-btn{width:100%;background:linear-gradient(135deg,var(--accent),#b8891f);border:none;border-radius:10px;padding:14px;color:var(--navy);font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:2px;cursor:pointer;transition:opacity 0.2s;}
    .login-btn:hover{opacity:0.9;}
    .login-error{color:var(--red);font-size:14px;margin-top:12px;}

    /* Admin */
    #admin-panel{display:none;}
    .admin-header{background:rgba(8,15,46,0.95);border-bottom:1px solid rgba(212,168,50,0.15);padding:20px 40px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
    .admin-logo{font-family:'Playfair Display',serif;font-size:22px;color:var(--accent);}
    .admin-logo span{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:3px;display:block;margin-top:2px;}
    .logout-btn{background:transparent;border:1px solid rgba(212,168,50,0.3);border-radius:8px;padding:8px 20px;color:var(--muted);font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.2s;}
    .logout-btn:hover{border-color:var(--accent);color:var(--accent);}
    .admin-body{max-width:1100px;margin:0 auto;padding:48px 40px;}
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:48px;}
    .stat-card{background:rgba(13,31,92,0.4);border:1px solid rgba(212,168,50,0.12);border-radius:14px;padding:28px;text-align:center;}
    .stat-num{font-family:'Playfair Display',serif;font-size:42px;color:var(--accent);line-height:1;margin-bottom:8px;}
    .stat-label{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
    .section-title{font-family:'Playfair Display',serif;font-size:24px;color:var(--white);margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid rgba(212,168,50,0.1);}
    .filter-tabs{display:flex;gap:12px;margin-bottom:28px;}
    .filter-tab{padding:8px 20px;border-radius:100px;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;border:1px solid rgba(212,168,50,0.2);color:var(--muted);background:transparent;transition:all 0.2s;letter-spacing:1px;}
    .filter-tab.active,.filter-tab:hover{background:rgba(212,168,50,0.1);border-color:rgba(212,168,50,0.5);color:var(--accent);}
    .testimonial-row{background:rgba(13,31,92,0.35);border:1px solid rgba(212,168,50,0.1);border-radius:14px;padding:28px 32px;margin-bottom:16px;transition:border-color 0.2s;}
    .testimonial-row:hover{border-color:rgba(212,168,50,0.25);}
    .row-header{display:flex;align-items:flex-start;justify-content:space-between;gap:20px;margin-bottom:12px;}
    .row-name{font-family:'Playfair Display',serif;font-size:18px;color:var(--white);margin-bottom:4px;}
    .row-details{font-family:'Space Mono',monospace;font-size:10px;color:var(--accent);letter-spacing:2px;}
    .row-text{color:var(--pale);font-style:italic;line-height:1.7;margin-bottom:16px;font-size:16px;}
    .row-stars{color:var(--gold);font-size:14px;margin-bottom:12px;}
    .status-badge{padding:4px 14px;border-radius:100px;font-family:'Space Mono',monospace;font-size:10px;letter-spacing:2px;flex-shrink:0;}
    .status-pending{background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.3);}
    .status-approved{background:rgba(110,231,183,0.1);color:var(--green);border:1px solid rgba(110,231,183,0.3);}
    .row-actions{display:flex;gap:10px;}
    .action-btn{padding:8px 20px;border-radius:8px;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;border:1px solid;transition:all 0.2s;letter-spacing:1px;}
    .approve-btn{background:rgba(110,231,183,0.1);border-color:rgba(110,231,183,0.4);color:var(--green);}
    .approve-btn:hover{background:rgba(110,231,183,0.2);}
    .delete-btn{background:rgba(248,113,113,0.1);border-color:rgba(248,113,113,0.3);color:var(--red);}
    .delete-btn:hover{background:rgba(248,113,113,0.2);}
    .unapprove-btn{background:rgba(251,191,36,0.1);border-color:rgba(251,191,36,0.3);color:#fbbf24;}
    .unapprove-btn:hover{background:rgba(251,191,36,0.2);}
    .empty-state{text-align:center;padding:60px;color:var(--muted);font-style:italic;}
    .timestamp{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);}
    .loading{text-align:center;padding:60px;color:var(--muted);}
  </style>
</head>
<body>

<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">🧠 MyndGuard</div>
    <div class="login-sub">Admin Panel</div>
    <input type="password" class="login-input" id="pwd-input" placeholder="Enter password"
           onkeydown="if(event.key==='Enter') doLogin()" />
    <button class="login-btn" onclick="doLogin()">SIGN IN</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="admin-panel">
  <div class="admin-header">
    <div class="admin-logo">🧠 MyndGuard<span>ADMIN PANEL</span></div>
    <div style="display:flex;align-items:center;gap:16px;">
      <a href="index.html" style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);text-decoration:none;">← Back to site</a>
      <button class="logout-btn" onclick="doLogout()">LOG OUT</button>
    </div>
  </div>

  <div class="admin-body">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="stat-total">—</div>
        <div class="stat-label">Total Submissions</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-pending" style="color:#fbbf24;">—</div>
        <div class="stat-label">Pending Review</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="stat-approved" style="color:var(--green);">—</div>
        <div class="stat-label">Approved & Live</div>
      </div>
    </div>

    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all',this)">All</button>
      <button class="filter-tab" onclick="setFilter('pending',this)">⏳ Pending</button>
      <button class="filter-tab" onclick="setFilter('approved',this)">✅ Approved</button>
    </div>

    <h2 class="section-title">Testimonials</h2>
    <div id="testimonials-list"><div class="loading">Loading testimonials...</div></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, query, orderBy }
    from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

  const ADMIN_PASSWORD = "MyndGuard2025!";

  const firebaseConfig = {
    apiKey: "AIzaSyAG-IU1PxGzXT4rshY8QUknWG3kI3t0nfg",
    authDomain: "myndguard-382d4.firebaseapp.com",
    projectId: "myndguard-382d4",
    storageBucket: "myndguard-382d4.firebasestorage.app",
    messagingSenderId: "971430698041",
    appId: "1:971430698041:web:733b0a269e2b5f602381e8"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  let allTestimonials = [];
  let currentFilter = 'all';

  window.doLogin = function() {
    const pwd = document.getElementById('pwd-input').value;
    if (pwd === ADMIN_PASSWORD) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-panel').style.display = 'block';
      loadTestimonials();
    } else {
      document.getElementById('login-error').textContent = 'Incorrect password. Please try again.';
      document.getElementById('pwd-input').value = '';
    }
  };

  window.doLogout = function() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('admin-panel').style.display = 'none';
    document.getElementById('pwd-input').value = '';
  };

  async function loadTestimonials() {
    try {
      const q = query(collection(db, 'Testimonials'), orderBy('timestamp', 'desc'));
      const snap = await getDocs(q);
      allTestimonials = [];
      snap.forEach(d => allTestimonials.push({ id: d.id, ...d.data() }));
      updateStats();
      renderList();
    } catch(e) {
      document.getElementById('testimonials-list').innerHTML =
        '<div class="empty-state">Could not load testimonials. Check Firebase rules.</div>';
    }
  }

  function updateStats() {
    const pending  = allTestimonials.filter(t => t.status === 'pending').length;
    const approved = allTestimonials.filter(t => t.status === 'approved').length;
    document.getElementById('stat-total').textContent    = allTestimonials.length;
    document.getElementById('stat-pending').textContent  = pending;
    document.getElementById('stat-approved').textContent = approved;
  }

  function renderList() {
    const list = document.getElementById('testimonials-list');
    const data = currentFilter === 'all'
      ? allTestimonials
      : allTestimonials.filter(t => t.status === currentFilter);
    if (!data.length) {
      list.innerHTML = '<div class="empty-state">No testimonials found.</div>';
      return;
    }
    list.innerHTML = data.map(t => {
      const stars = '★'.repeat(t.rating||5) + '☆'.repeat(5-(t.rating||5));
      const date  = t.timestamp?.toDate
        ? t.timestamp.toDate().toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})
        : 'Just now';
      const isPending = t.status === 'pending';
      return `
        <div class="testimonial-row" id="row-${t.id}">
          <div class="row-header">
            <div>
              <div class="row-name">${t.name}</div>
              <div class="row-details">${t.role}${t.location?' · '+t.location:''}</div>
            </div>
            <span class="status-badge status-${t.status}">${t.status.toUpperCase()}</span>
          </div>
          <div class="row-stars">${stars}</div>
          <div class="row-text">"${t.text}"</div>
          <div style="display:flex;align-items:center;justify-content:space-between;">
            <span class="timestamp">Submitted: ${date}</span>
            <div class="row-actions">
              ${isPending
                ? `<button class="action-btn approve-btn" onclick="approveTestimonial('${t.id}')">✅ Approve</button>`
                : `<button class="action-btn unapprove-btn" onclick="unapproveTestimonial('${t.id}')">↩ Unapprove</button>`}
              <button class="action-btn delete-btn" onclick="deleteTestimonial('${t.id}')">🗑 Delete</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  window.approveTestimonial = async function(id) {
    try {
      await updateDoc(doc(db,'Testimonials',id), { status:'approved' });
      const t = allTestimonials.find(t => t.id===id);
      if (t) t.status = 'approved';
      updateStats(); renderList();
    } catch(e) { alert('Could not approve. Try again.'); }
  };

  window.unapproveTestimonial = async function(id) {
    try {
      await updateDoc(doc(db,'Testimonials',id), { status:'pending' });
      const t = allTestimonials.find(t => t.id===id);
      if (t) t.status = 'pending';
      updateStats(); renderList();
    } catch(e) { alert('Could not unapprove. Try again.'); }
  };

  window.deleteTestimonial = async function(id) {
    if (!confirm('Are you sure you want to permanently delete this testimonial?')) return;
    try {
      await deleteDoc(doc(db,'Testimonials',id));
      allTestimonials = allTestimonials.filter(t => t.id!==id);
      updateStats(); renderList();
    } catch(e) { alert('Could not delete. Try again.'); }
  };

  window.setFilter = function(filter, btn) {
    currentFilter = filter;
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    renderList();
  };
</script>
</body>
</html>
